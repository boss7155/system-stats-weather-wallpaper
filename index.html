<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Stats + Weather Wallpaper</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background-image: radial-gradient(#1a1a2e, #0a0a14);
    color: #fff;
    font-family: Monospace;
    font-size: 13px;
    line-height: 24px;
    overscroll-behavior: none;
    overflow: hidden;
}
#body { overflow: hidden; height: 100vh; }
canvas { display: block; }

/* ===== CENTER WIDGET ===== */
.center-widget {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

/* CLOCK */
.clock-time {
    font-size: 86px;
    font-weight: 200;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.9);
    line-height: 1;
    text-shadow: 0 0 40px rgba(100,150,255,0.25);
}
.clock-date {
    font-size: 18px;
    font-weight: 300;
    color: rgba(180,200,230,0.7);
    margin-top: 6px;
    letter-spacing: 3px;
}

/* WEATHER */
.weather-container {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 16px 30px;
}
.weather-icon-wrap { width: 100px; height: 100px; position: relative; flex-shrink: 0; }
.weather-info { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
.weather-temp { font-size: 42px; font-weight: 300; color: rgba(255,255,255,0.9); line-height: 1; }
.weather-desc { font-size: 15px; color: rgba(180,200,230,0.65); }
.weather-city { font-size: 13px; color: rgba(150,170,200,0.45); margin-top: 2px; }

/* ===== SUN ICON ===== */
.weather-icon-sunny { position:relative; width:100%; height:100%; }
.weather-icon-sunny .sun-core {
    position:absolute; top:50%; left:50%; width:44px; height:44px;
    background:radial-gradient(circle,#FFD93D,#FF8C00); border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 35px rgba(255,217,61,0.6),0 0 70px rgba(255,140,0,0.3);
    animation:sunPulse 3s ease-in-out infinite;
}
.weather-icon-sunny .sun-ray {
    position:absolute; top:50%; left:50%; width:3px; height:16px;
    background:linear-gradient(to top,rgba(255,217,61,0.8),transparent);
    border-radius:2px; transform-origin:center 48px;
}
@keyframes sunPulse {
    0%,100% { box-shadow:0 0 35px rgba(255,217,61,0.6),0 0 70px rgba(255,140,0,0.3); }
    50% { box-shadow:0 0 50px rgba(255,217,61,0.8),0 0 100px rgba(255,140,0,0.4); }
}

/* CLOUD */
.weather-icon-cloudy { position:relative; width:100%; height:100%; }
.cloud { position:absolute; background:linear-gradient(135deg,rgba(200,210,230,0.9),rgba(160,175,200,0.8)); border-radius:50px; box-shadow:0 6px 24px rgba(0,0,0,0.2); }
.cloud::before,.cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
.weather-icon-cloudy .cloud-main { width:70px; height:26px; top:50px; left:15px; animation:cloudFloat 6s ease-in-out infinite; }
.weather-icon-cloudy .cloud-main::before { width:35px; height:35px; top:-22px; left:10px; }
.weather-icon-cloudy .cloud-main::after { width:26px; height:26px; top:-13px; left:36px; }
.weather-icon-cloudy .cloud-back { width:52px; height:20px; top:38px; left:35px; opacity:0.6; animation:cloudFloat 6s ease-in-out infinite; animation-delay:-2s; }
.weather-icon-cloudy .cloud-back::before { width:26px; height:26px; top:-16px; left:7px; }
.weather-icon-cloudy .cloud-back::after { width:20px; height:20px; top:-9px; left:26px; }
@keyframes cloudFloat { 0%,100%{transform:translateX(0)} 50%{transform:translateX(7px)} }

/* RAIN */
.weather-icon-rainy { position:relative; width:100%; height:100%; }
.weather-icon-rainy .cloud-main {
    width:70px; height:26px; top:25px; left:15px;
    background:linear-gradient(135deg,rgba(140,155,180,0.9),rgba(110,125,150,0.8));
    border-radius:50px; box-shadow:0 6px 24px rgba(0,0,0,0.2); animation:cloudFloat 6s ease-in-out infinite;
}
.weather-icon-rainy .cloud-main::before { content:''; position:absolute; background:linear-gradient(135deg,rgba(140,155,180,0.9),rgba(110,125,150,0.8)); border-radius:50%; width:35px; height:35px; top:-22px; left:10px; }
.weather-icon-rainy .cloud-main::after { content:''; position:absolute; background:linear-gradient(135deg,rgba(140,155,180,0.9),rgba(110,125,150,0.8)); border-radius:50%; width:26px; height:26px; top:-13px; left:36px; }
.raindrop { position:absolute; width:2px; background:linear-gradient(to bottom,transparent,rgba(100,160,255,0.8)); border-radius:0 0 2px 2px; animation:rainFall linear infinite; }
@keyframes rainFall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(60px);opacity:0} }

/* SNOW */
.weather-icon-snowy { position:relative; width:100%; height:100%; }
.weather-icon-snowy .cloud-main { width:70px; height:26px; top:25px; left:15px; background:linear-gradient(135deg,rgba(200,210,230,0.9),rgba(160,175,200,0.8)); border-radius:50px; box-shadow:0 6px 24px rgba(0,0,0,0.2); animation:cloudFloat 6s ease-in-out infinite; }
.weather-icon-snowy .cloud-main::before { content:''; position:absolute; background:inherit; border-radius:50%; width:35px; height:35px; top:-22px; left:10px; }
.weather-icon-snowy .cloud-main::after { content:''; position:absolute; background:inherit; border-radius:50%; width:26px; height:26px; top:-13px; left:36px; }
.snowflake { position:absolute; color:rgba(220,230,255,0.9); animation:snowFall linear infinite; }
@keyframes snowFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(60px) rotate(360deg);opacity:0} }

/* STORM */
.weather-icon-stormy { position:relative; width:100%; height:100%; }
.weather-icon-stormy .cloud-main { width:74px; height:28px; top:20px; left:13px; background:linear-gradient(135deg,rgba(80,90,110,0.95),rgba(50,55,70,0.9)); border-radius:50px; box-shadow:0 6px 24px rgba(0,0,0,0.3); animation:cloudFloat 4s ease-in-out infinite; }
.weather-icon-stormy .cloud-main::before { content:''; position:absolute; background:inherit; border-radius:50%; width:38px; height:38px; top:-24px; left:9px; }
.weather-icon-stormy .cloud-main::after { content:''; position:absolute; background:inherit; border-radius:50%; width:28px; height:28px; top:-14px; left:36px; }
.lightning-bolt { position:absolute; top:48px; left:50%; transform:translateX(-50%); animation:lightningFlash 3s ease-in-out infinite; }
.lightning-bolt svg { width:26px; height:44px; }
@keyframes lightningFlash { 0%,89%,91%,93%,100%{opacity:0} 90%,92%{opacity:1} }

/* MIST */
.weather-icon-misty { position:relative; width:100%; height:100%; }
.mist-line { position:absolute; height:3px; border-radius:3px; background:linear-gradient(90deg,transparent,rgba(180,200,220,0.6),transparent); animation:mistDrift 8s ease-in-out infinite; }
@keyframes mistDrift { 0%,100%{transform:translateX(0);opacity:0.5} 50%{transform:translateX(12px);opacity:0.8} }

/* PARTLY CLOUDY */
.weather-icon-partly-cloudy { position:relative; width:100%; height:100%; }
.weather-icon-partly-cloudy .mini-sun { position:absolute; top:16px; right:12px; width:32px; height:32px; background:radial-gradient(circle,#FFD93D,#FF8C00); border-radius:50%; box-shadow:0 0 20px rgba(255,217,61,0.5); animation:sunPulse 3s ease-in-out infinite; }
.weather-icon-partly-cloudy .cloud-main { width:62px; height:22px; top:44px; left:12px; background:linear-gradient(135deg,rgba(200,210,230,0.9),rgba(160,175,200,0.8)); border-radius:50px; box-shadow:0 6px 24px rgba(0,0,0,0.2); animation:cloudFloat 6s ease-in-out infinite; z-index:2; }
.weather-icon-partly-cloudy .cloud-main::before { content:''; position:absolute; background:inherit; border-radius:50%; width:30px; height:30px; top:-19px; left:8px; }
.weather-icon-partly-cloudy .cloud-main::after { content:''; position:absolute; background:inherit; border-radius:50%; width:22px; height:22px; top:-10px; left:30px; }
    </style>
</head>
<body id="body">

    <!-- Center Weather & Time Widget -->
    <div class="center-widget" id="centerWidget">
        <div class="clock-container">
            <div class="clock-time" id="clockTime">--:--</div>
            <div class="clock-date" id="clockDate">--</div>
        </div>
        <div class="weather-container" id="weatherContainer">
            <div class="weather-icon-wrap" id="weatherIconWrap"></div>
            <div class="weather-info">
                <div class="weather-temp" id="weatherTemp">--°</div>
                <div class="weather-desc" id="weatherDesc">Загрузка...</div>
                <div class="weather-city" id="weatherCity">--</div>
            </div>
        </div>
    </div>

    <!-- System Stats Charts — EXACTLY LIKE ORIGINAL -->
    <div style="z-index:100; position:absolute; width:20vw; height:20vh; left:10%; top:15%;">
        <canvas id="cpuChart"></canvas>
    </div>
    <div style="z-index:100; position:absolute; width:20vw; height:20vh; left:10%; top:52.5%;">
        <canvas id="gpuChart"></canvas>
    </div>
    <div style="z-index:100; position:absolute; width:20vw; height:20vh; left:70%; top:25%;">
        <canvas id="ramChart"></canvas>
    </div>
    <div style="z-index:100; position:absolute; width:20vw; height:20vh; left:70%; top:62.5%;">
        <canvas id="netChart"></canvas>
    </div>

    <!-- Libraries from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/min/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0/dist/Chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-streaming@1.8.0/dist/chartjs-plugin-streaming.min.js"></script>

    <script>
// ===== КОНФИГУРАЦИЯ =====
var CONFIG = {
    weatherApiKey: 'fb03172bdbe0819e4c53d9695ab10474',
    weatherCity: 'Brest',
    weatherCountryCode: 'BY',
    timezone: 'Europe/Minsk',
    weatherLang: 'ru',
    weatherRefreshInterval: 10 * 60 * 1000,
    weatherUnits: 'metric',
};

// ===== CHARTS — ОРИГИНАЛЬНЫЙ КОД =====
var cpuCounter = 0, gpuCounter = 0, netDownCounter = 0, netUpCounter = 0;
var memTotal = 1, memFree = 0;
var cpuName = "", gpuName = "", memoryName = "", netCardName = "";
var isChartInit = false;

var chartColors = {
    red: 'rgb(255, 99, 132)',
    orange: 'rgb(255, 159, 64)',
    yellow: 'rgb(255, 205, 86)',
    green: 'rgb(0, 192, 0)',
    blue: 'rgb(54, 162, 235)',
    purple: 'rgb(153, 102, 255)',
    grey: 'rgb(201, 203, 207)',
    lightGrey: 'rgb(105, 105, 105)',
    black: 'rgb(0, 0, 0)',
};
var color = Chart.helpers.color;

Chart.defaults.global.legend.display = false;
Chart.defaults.global.responsive = true;
Chart.defaults.global.elements.pointRadius = 0;
Chart.defaults.global.tooltips.enabled = false;

var cpuChartConfig = {
    type: 'line',
    data: {
        datasets: [{
            label: 'CPU',
            backgroundColor: color(chartColors.grey).alpha(0.5).rgbString(),
            borderColor: chartColors.grey,
            fill: false, lineTension: 0, borderDash: [0,0], pointRadius: 0, data: []
        }],
    },
    options: {
        maintainAspectRatio: false,
        legend: { display: false },
        title: { display: true, text: 'Processor' },
        scales: {
            xAxes: [{ type:'realtime', realtime:{ duration:20000, refresh:1000, delay:1000, onRefresh:onRefresh }, ticks:{ display:false } }],
            yAxes: [{ scaleLabel:{ display:false, labelString:'%' }, ticks:{ beginAtZero:true, max:100 } }]
        },
    }
};

var gpuChartConfig = {
    type: 'line',
    data: {
        datasets: [{
            label: 'GPU',
            backgroundColor: color(chartColors.grey).alpha(0.5).rgbString(),
            borderColor: chartColors.grey,
            fill: false, lineTension: 0, borderDash: [0,0], pointRadius: 0, data: []
        }]
    },
    options: {
        maintainAspectRatio: false,
        legend: { display: false },
        title: { display: true, text: 'Graphics' },
        scales: {
            xAxes: [{ type:'realtime', realtime:{ duration:20000, refresh:1000, delay:1000, onRefresh:onRefresh }, ticks:{ display:false } }],
            yAxes: [{ scaleLabel:{ display:false, labelString:'%' }, ticks:{ beginAtZero:true, max:100 } }]
        },
    }
};

var ramChartConfig = {
    type: 'line',
    data: {
        datasets: [{
            label: 'RAM',
            backgroundColor: color(chartColors.grey).alpha(0.5).rgbString(),
            borderColor: chartColors.grey,
            fill: false, lineTension: 0, borderDash: [0,0], pointRadius: 0, data: []
        }]
    },
    options: {
        maintainAspectRatio: false,
        legend: { display: false },
        title: { display: true, text: 'Memory' },
        scales: {
            xAxes: [{ type:'realtime', realtime:{ duration:20000, refresh:1000, delay:1000, onRefresh:onRefresh }, ticks:{ display:false } }],
            yAxes: [{ scaleLabel:{ display:false, labelString:'%' }, ticks:{ beginAtZero:true, max:100 } }]
        },
    }
};

var netChartConfig = {
    type: 'line',
    data: {
        datasets: [{
            label: 'Net Down',
            backgroundColor: color(chartColors.grey).alpha(0.5).rgbString(),
            borderColor: chartColors.grey,
            fill: false, lineTension: 0, borderDash: [0,0], pointRadius: 0, data: []
        },
        {
            label: 'Net Up',
            backgroundColor: color(chartColors.lightGrey).alpha(0.5).rgbString(),
            borderColor: chartColors.lightGrey,
            fill: false, lineTension: 0, borderDash: [0,0], pointRadius: 0, data: []
        }]
    },
    options: {
        legend: { display: false },
        title: { display: true, text: 'Network' },
        scales: {
            xAxes: [{ type:'realtime', realtime:{ duration:20000, refresh:1000, delay:1000, onRefresh:onRefresh }, ticks:{ display:false } }],
            yAxes: [{ scaleLabel:{ display:false, labelString:'%' }, ticks:{ beginAtZero:true, suggestedMax:100 } }]
        },
    }
};

function onRefresh(chart) {
    var data = [];
    switch(chart) {
        case cpuChart: data[0] = cpuCounter; break;
        case gpuChart: data[0] = gpuCounter; break;
        case netChart: data[0] = netDownCounter; data[1] = netUpCounter; break;
        case ramChart: data[0] = (memTotal - memFree) * 100 / memTotal; break;
    }
    var i = 0;
    chart.config.data.datasets.forEach(function(dataset) {
        dataset.data.push({ x: Date.now(), y: data[i] });
        i++;
    });
}

var cpuChart, gpuChart, netChart, ramChart;
function initChart() {
    cpuChartConfig.options.title.text = cpuName;
    gpuChartConfig.options.title.text = gpuName;
    netChartConfig.options.title.text = netCardName;
    ramChartConfig.options.title.text = memoryName;

    cpuChart = new Chart(document.getElementById('cpuChart').getContext('2d'), cpuChartConfig);
    gpuChart = new Chart(document.getElementById('gpuChart').getContext('2d'), gpuChartConfig);
    netChart = new Chart(document.getElementById('netChart').getContext('2d'), netChartConfig);
    ramChart = new Chart(document.getElementById('ramChart').getContext('2d'), ramChartConfig);
}

// Lively Wallpaper callback — системные данные
function livelySystemInformation(data) {
    var obj = JSON.parse(data);
    cpuName = obj.NameCpu;
    gpuName = obj.NameGpu;
    netCardName = obj.NameNetCard;
    memoryName = "Memory (" + obj.TotalRam / 1024 + " GB)";
    cpuCounter = obj.CurrentCpu;
    gpuCounter = obj.CurrentGpu3D;
    netDownCounter = (obj.CurrentNetDown * 8) / (1024 * 1024);
    netUpCounter = (obj.CurrentNetUp * 8) / (1024 * 1024);
    memFree = obj.CurrentRamAvail;
    memTotal = obj.TotalRam;
    if (!isChartInit) { isChartInit = true; initChart(); }
}

// ===== ЧАСЫ =====
function updateClock() {
    var now = new Date();
    var timeStr = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', timeZone:CONFIG.timezone });
    var dateStr = now.toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', timeZone:CONFIG.timezone });
    var el1 = document.getElementById('clockTime'); if(el1) el1.textContent = timeStr;
    var el2 = document.getElementById('clockDate'); if(el2) el2.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
}
setInterval(updateClock, 1000);
updateClock();

// ===== ПОГОДА =====
function fetchWeather() {
    if(CONFIG.weatherApiKey === 'YOUR_OPENWEATHERMAP_API_KEY') {
        document.getElementById('weatherTemp').textContent = '--°';
        document.getElementById('weatherDesc').textContent = 'Настройте API ключ';
        document.getElementById('weatherCity').textContent = CONFIG.weatherCity;
        renderWeatherIcon('clear');
        return;
    }
    var url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(CONFIG.weatherCity+','+CONFIG.weatherCountryCode) + '&appid=' + CONFIG.weatherApiKey + '&units=' + CONFIG.weatherUnits + '&lang=' + CONFIG.weatherLang;
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
        if(data.cod && data.cod !== 200) { document.getElementById('weatherDesc').textContent = 'Ошибка: '+(data.message||'неизвестно'); return; }
        var temp = Math.round(data.main.temp);
        var desc = data.weather[0].description;
        var city = data.name;
        document.getElementById('weatherTemp').textContent = temp + '°';
        document.getElementById('weatherDesc').textContent = desc.charAt(0).toUpperCase() + desc.slice(1);
        document.getElementById('weatherCity').textContent = city;
        renderWeatherIcon(mapWeatherIcon(data.weather[0].icon, data.weather[0].id));
    }).catch(function(){ document.getElementById('weatherDesc').textContent = 'Нет связи'; });
}

function mapWeatherIcon(iconCode, id) {
    if(id>=200 && id<300) return 'storm';
    if(id>=300 && id<400) return 'rain';
    if(id>=500 && id<600) { if(id===511) return 'snow'; return 'rain'; }
    if(id>=600 && id<700) return 'snow';
    if(id>=700 && id<800) return 'mist';
    if(id===800) return iconCode.endsWith('n') ? 'clear-night' : 'clear';
    if(id>800) { if(id===801||id===802) return 'partly-cloudy'; return 'cloudy'; }
    return 'clear';
}

// ===== ИКОНКИ ПОГОДЫ =====
function renderWeatherIcon(type) {
    var w = document.getElementById('weatherIconWrap'); if(!w) return;
    switch(type) {
        case 'clear': w.innerHTML = renderSunny(); break;
        case 'clear-night': w.innerHTML = renderNight(); break;
        case 'partly-cloudy': w.innerHTML = renderPartlyCloudy(); break;
        case 'cloudy': w.innerHTML = renderCloudy(); break;
        case 'rain': w.innerHTML = renderRain(); break;
        case 'snow': w.innerHTML = renderSnow(); break;
        case 'storm': w.innerHTML = renderStorm(); break;
        case 'mist': w.innerHTML = renderMist(); break;
        default: w.innerHTML = renderSunny();
    }
}

function renderSunny() { var r=''; for(var i=0;i<12;i++) r+='<div class="sun-ray" style="transform:rotate('+i*30+'deg) translateY(-48px)"></div>'; return '<div class="weather-icon-sunny"><div class="sun-core"></div>'+r+'</div>'; }
function renderNight() { return '<div class="weather-icon-sunny" style="filter:hue-rotate(200deg) brightness(0.6)"><div class="sun-core" style="background:radial-gradient(circle,#c8d8f0,#8a9cc0);box-shadow:0 0 25px rgba(150,170,220,0.4)"></div></div>'; }
function renderCloudy() { return '<div class="weather-icon-cloudy"><div class="cloud cloud-back"></div><div class="cloud cloud-main"></div></div>'; }
function renderPartlyCloudy() { return '<div class="weather-icon-partly-cloudy"><div class="mini-sun"></div><div class="cloud cloud-main"></div></div>'; }
function renderRain() {
    var d='',p=[{l:24,d:0,h:16},{l:36,d:0.3,h:20},{l:48,d:0.6,h:14},{l:60,d:0.15,h:18},{l:72,d:0.45,h:16},{l:30,d:0.7,h:12},{l:54,d:0.2,h:20},{l:66,d:0.55,h:14}];
    for(var i=0;i<p.length;i++) d+='<div class="raindrop" style="left:'+p[i].l+'px;top:55px;height:'+p[i].h+'px;animation-duration:0.7s;animation-delay:'+p[i].d+'s"></div>';
    return '<div class="weather-icon-rainy"><div class="cloud cloud-main"></div>'+d+'</div>';
}
function renderSnow() {
    var f='',p=[{l:26,d:0,s:9},{l:38,d:0.8,s:7},{l:50,d:0.4,s:11},{l:62,d:1.2,s:8},{l:74,d:0.6,s:10},{l:32,d:1.0,s:6},{l:56,d:0.2,s:9},{l:68,d:0.9,s:7}];
    for(var i=0;i<p.length;i++) f+='<div class="snowflake" style="left:'+p[i].l+'px;top:55px;font-size:'+p[i].s+'px;animation-duration:2.5s;animation-delay:'+p[i].d+'s">*</div>';
    return '<div class="weather-icon-snowy"><div class="cloud cloud-main"></div>'+f+'</div>';
}
function renderStorm() {
    var d='',p=[{l:26,d:0,h:14},{l:40,d:0.3,h:18},{l:54,d:0.5,h:12},{l:68,d:0.15,h:16}];
    for(var i=0;i<p.length;i++) d+='<div class="raindrop" style="left:'+p[i].l+'px;top:70px;height:'+p[i].h+'px;animation-duration:0.5s;animation-delay:'+p[i].d+'s"></div>';
    return '<div class="weather-icon-stormy"><div class="cloud cloud-main"></div><div class="lightning-bolt"><svg viewBox="0 0 30 50" fill="none"><polygon points="18,0 8,22 15,22 10,50 25,18 17,18 22,0" fill="#FFD93D" opacity="0.9"/></svg></div>'+d+'</div>';
}
function renderMist() {
    var l='',c=[{t:30,l:8,w:84,d:0},{t:42,l:16,w:68,d:1.5},{t:54,l:4,w:92,d:3},{t:66,l:20,w:60,d:4.5}];
    for(var i=0;i<c.length;i++) l+='<div class="mist-line" style="top:'+c[i].t+'px;left:'+c[i].l+'px;width:'+c[i].w+'px;animation-delay:'+c[i].d+'s"></div>';
    return '<div class="weather-icon-misty">'+l+'</div>';
}

// ===== INIT =====
