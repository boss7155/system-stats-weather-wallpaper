<!DOCTYPE html>
<html lang="en">
        <head>
                <title>System Stats + Weather</title>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
                <link rel="stylesheet" href="style/main.css">
        </head>
        <body id="body">

                <!-- Dynamic weather backgrounds — crossfade layers -->
                <div id="bgCurrent" class="bg-layer"></div>
                <div id="bgNext" class="bg-layer"></div>
                <div id="bgOverlay" class="bg-overlay"></div>

                <!-- Fullscreen weather effects: rain, snow, lightning -->
                <div id="weatherFx" class="weather-fx"></div>

                <!-- Center Weather & Time Widget -->
                <div class="center-widget" id="centerWidget">
                        <div class="clock-container">
                                <div class="clock-time" id="clockTime">--:--</div>
                                <div class="clock-date" id="clockDate">--</div>
                        </div>
                        <div class="weather-container" id="weatherContainer">
                                <div class="weather-icon-wrap" id="weatherIconWrap"></div>
                                <div class="weather-info">
                                        <div class="weather-temp" id="weatherTemp">--°</div>
                                        <div class="weather-desc" id="weatherDesc">Загрузка...</div>
                                        <div class="weather-city" id="weatherCity">--</div>
                                </div>
                        </div>
                </div>

                <!-- System Stats Charts — original layout positions -->
                <div class="chart-box chart-cpu">
                        <canvas id="cpuChart"></canvas>
                </div>

                <div class="chart-box chart-gpu">
                        <canvas id="gpuChart"></canvas>
                </div>

                <div class="chart-box chart-ram">
                        <canvas id="ramChart"></canvas>
                </div>

                <div class="chart-box chart-net">
                        <canvas id="netChart"></canvas>
                </div>

                <!-- Audio Visualizer — centered between RAM and Network -->
                <div class="music-widget" id="musicWidget">
                        <div class="music-widget-inner">
                                <div class="track-info" id="trackInfo">
                                        <div class="track-title-wrap">
                                                <span class="track-title" id="trackTitle"></span>
                                        </div>
                                        <span class="track-artist" id="trackArtist"></span>
                                </div>
                                <canvas id="audioVisualizer" class="music-visualizer" width="400" height="80"></canvas>
                        </div>
                </div>

                <!-- LOCAL JS FILES — NOT CDN! Lively blocks CDN -->
                <script src="js/moment.min.js"></script>
                <script src="js/chart.js"></script>
                <script src="js/chartjs-plugin-streaming.min.js"></script>
                <script src="js/script.js"></script>
        </body>
</html>
